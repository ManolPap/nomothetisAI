name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies (incl. dev)
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app

      - name: FastAPI smoke test (liveness /health)
        run: |
          set -euo pipefail
          uv run python -m uvicorn app.main:app --host 127.0.0.1 --port 8765 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true' EXIT
          url="http://127.0.0.1:8765/health"
          ok=0
          for _ in $(seq 1 30); do
            if curl -sf "$url" -o /tmp/smoke.json; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error title=Smoke test failed::GET $url did not return 200 within 30s"
            exit 1
          fi
          uv run python -c "import json; d=json.load(open('/tmp/smoke.json')); assert d == {'status': 'ok'}, d"
          echo "Smoke OK: GET /health matched app/api/health liveness probe"
